apply plugin: 'com.android.application'

android {
    namespace 'com.supermariobros.c'
    compileSdk 34

    defaultConfig {
        applicationId 'com.supermariobros.c'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }

        externalNativeBuild {
            cmake {
                arguments '-DANDROID=ON', '-DANDROID_STL=c++_shared'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path '../../CMakeLists.txt'
        }
    }

    sourceSets {
        main {
            assets.srcDirs = ['../../assets']
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }
}
