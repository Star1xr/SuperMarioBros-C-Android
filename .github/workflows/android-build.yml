name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle and NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/ndk
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle') }}

      - name: Setup Android NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125" --sdk_root=$ANDROID_HOME

      - name: Set up SDL2
        run: |
          if [ ! -d "SDL2" ]; then
            git clone --depth 1 --branch release-2.30.3 https://github.com/libsdl-org/SDL.git SDL2
          fi

      - name: Download ROM
        run: |
          curl -sL -o "assets/Super Mario Bros. (JU) (PRG0) [!].nes" \
            "https://raw.githubusercontent.com/seven7bits/7bits/master/app/roms/Super%20Mario%20Bros.%20(JU)%20(PRG0)%20%5B!%5D.nes"
          ls -la assets/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.5

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          archive: false
