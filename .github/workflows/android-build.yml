name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle and NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/ndk
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle') }}

      - name: Setup Android NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125" --sdk_root=$ANDROID_HOME

      - name: Set up SDL2
        run: |
          if [ ! -d "SDL2" ]; then
            git clone --depth 1 --branch release-2.30.3 https://github.com/libsdl-org/SDL.git SDL2
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.5

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperMarioBros-C-Android
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: continuous
          name: Latest Build
          files: android/app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: false
          generate_release_notes: false
          make_latest: false
